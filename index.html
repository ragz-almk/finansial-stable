<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finansial Stable</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100 font-sans p-4 md:p-8 relative">

  <div id="loginScreen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-zinc-950 p-4">
    <div class="text-center space-y-4 max-w-sm w-full bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl">
      <h1 class="text-3xl font-bold text-orange-500 tracking-tight">Finansial Stable</h1>
      <p class="text-zinc-400 text-sm mb-6">Silakan login untuk mengelola keuangan harianmu dengan aman di Cloud.</p>
      
      <button id="btnLogin" class="w-full bg-white hover:bg-zinc-200 text-zinc-900 transition-colors py-3 rounded-xl font-bold flex items-center justify-center gap-3">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5">
        Login dengan Google
      </button>
    </div>
  </div>

  <div id="appScreen" class="hidden">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div>
        <h1 class="text-3xl font-bold text-orange-500 tracking-tight">Finansial Stable</h1>
        <p class="text-zinc-400">Halo, <span id="userNameDisplay" class="font-semibold text-white">User</span>! Kelola keuanganmu dengan bijak.</p>
      </div>
      
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2 bg-zinc-900 border border-zinc-800 p-2 rounded-xl">
          <i data-lucide="calendar" class="text-orange-500 w-5 h-5 ml-2"></i>
          <input type="month" id="monthFilter" class="bg-transparent border-none text-white outline-none focus:ring-0 p-1 cursor-pointer custom-date-input">
        </div>

        <button id="btnOpenModal" class="bg-orange-600 hover:bg-orange-500 transition-colors text-white px-6 py-3 rounded-xl flex items-center justify-center gap-2 font-semibold shadow-lg shadow-orange-900/20">
          <i data-lucide="plus" class="w-5 h-5"></i>
          Catat Transaksi
        </button>

        <button id="btnLogout" class="bg-zinc-800 hover:bg-red-500/20 hover:text-red-500 transition-colors text-zinc-400 p-3 rounded-xl border border-zinc-700">
          <i data-lucide="log-out" class="w-5 h-5"></i>
        </button>
      </div>
    </div>

    </div>

  <script type="module" src="script.js"></script>
</body>

</html>
